name = "carl-biovillage"
main = "worker.js"
compatibility_date = "2024-12-01"

# Static assets (HTML, CSS, JS) served from the same domain
[assets]
directory = "./public"

# Custom domain — routes all carl.typelabs.ai traffic through this Worker
routes = [
  { pattern = "carl.typelabs.ai/*", zone_name = "typelabs.ai" }
]

# Required secret (set via Cloudflare dashboard or `wrangler secret put ANTHROPIC_API_KEY`):
# ANTHROPIC_API_KEY
