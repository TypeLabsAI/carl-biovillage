<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <main id="app">
    <!-- Carl Billboard -->
    <div class="billboard-container">
      <img src="carl-billboard.jpg" alt="Carl's Billboard — Don't forget, no billboards in space. Love, Carl" class="carl-billboard" />
    </div>

    <!-- Header -->
    <header class="carl-header">
      <h1 class="greeting">Hello traveler.</h1>
      <p class="subtext">You were looking up at the stars.</p>
    </header>

    <!-- Cosmic Destination Card (shown when proto data is present) -->
    <div id="destination-card" class="destination-card hidden" aria-label="Your cosmic destination">
      <div class="dest-header">
        <span class="dest-label">Your Cosmic Destination</span>
      </div>
      <div class="dest-body">
        <span class="dest-emoji"></span>
        <div class="dest-info">
          <span class="dest-name"></span>
          <span class="dest-subtitle"></span>
        </div>
      </div>
      <div class="dest-stats"></div>
    </div>

    <!-- Chat Area -->
    <section class="chat-area" id="chat-area" aria-label="Conversation with Carl" role="log" aria-live="polite">
      <!-- Messages appear here -->
    </section>

    <!-- Input -->
    <form class="input-area" id="chat-form" autocomplete="off">
      <input
        type="text"
        id="chat-input"
        placeholder="Ask Carl about the cosmos..."
        aria-label="Your message to Carl"
        maxlength="500"
        autofocus
      >
      <button type="submit" id="send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </button>
    </form>

    <!-- Back link -->
    <nav class="back-link">
      <a href="https://village.typelabs.ai" aria-label="Return to BioVillage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to the Village
      </a>
    </nav>

    <footer class="attribution">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
        Created with Perplexity Computer
      </a>
    </footer>
  </main>

  <script src="starfield.js"></script>
  <script src="chat.js"></script>
  <script src="music.js"></script>
</body>
</html>
